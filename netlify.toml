[build]
  command = "pnpm install --no-frozen-lockfile && pnpm run build:ssg"
  publish = "dist/client"

# Custom 404 page configuration
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Cache control headers
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
