name: Generate AI News Articles

on:
  schedule:
    # Runs at 09:00 UTC on Monday, Wednesday, and Friday (3 times a week)
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch: # Allows manual triggering

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Run news generation script
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_news.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add new AI news article"
          title: "New AI News Article: ${{ steps.generate.outputs.article_title }}"
          body: "This is an automated news article generated by the AI pipeline."
          branch: "auto-news-update"
          base: "main"
